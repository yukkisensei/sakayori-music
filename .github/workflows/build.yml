name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 fakeroot rpm

      - run: chmod +x ./gradlew

      - run: ./gradlew vlcSetup

      - run: ./gradlew composeApp:packageDeb composeApp:packageRpm -PisFullBuild=true

      - uses: actions/upload-artifact@v4
        with:
          name: SakayoriMusic-linux
          path: |
            composeApp/build/compose/binaries/main/deb/*.deb
            composeApp/build/compose/binaries/main/rpm/*.rpm
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Windows EXE + MSI
        shell: pwsh
        run: .\gradlew.bat vlcSetup composeApp:packageExe composeApp:packageMsi -PisFullBuild=true

      - uses: actions/upload-artifact@v4
        with:
          name: SakayoriMusic-windows
          path: |
            composeApp/build/compose/binaries/main/exe/*.exe
            composeApp/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - run: chmod +x ./gradlew

      - run: ./gradlew vlcSetup

      - run: ./gradlew composeApp:packageDmg composeApp:packagePkg -PisFullBuild=true

      - uses: actions/upload-artifact@v4
        with:
          name: SakayoriMusic-macos-arm64
          path: |
            composeApp/build/compose/binaries/main/dmg/*.dmg
            composeApp/build/compose/binaries/main/pkg/*.pkg
          if-no-files-found: error

  ios-framework:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - run: chmod +x ./gradlew

      - name: Link iOS framework (device + simulator)
        run: ./gradlew composeApp:linkReleaseFrameworkIosArm64 composeApp:linkReleaseFrameworkIosSimulatorArm64

      - uses: actions/upload-artifact@v4
        with:
          name: SakayoriMusic-ios-framework
          path: |
            composeApp/build/bin/iosArm64/releaseFramework/**
            composeApp/build/bin/iosSimulatorArm64/releaseFramework/**
          if-no-files-found: error

  ios-ipa:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - run: chmod +x ./gradlew

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build iOS archive (unsigned)
        working-directory: iosApp
        run: |
          xcodebuild archive \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/SakayoriMusic.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM=""

      - name: Package unsigned IPA
        working-directory: iosApp
        run: |
          mkdir -p build/Payload
          cp -R build/SakayoriMusic.xcarchive/Products/Applications/iosApp.app build/Payload/SakayoriMusic.app
          cd build
          zip -qry SakayoriMusic-2.1.5-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: SakayoriMusic-ios-ipa-unsigned
          path: iosApp/build/SakayoriMusic-2.1.5-unsigned.ipa
          if-no-files-found: error
