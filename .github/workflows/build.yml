name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 fakeroot rpm file desktop-file-utils

      - run: chmod +x ./gradlew

      - run: ./gradlew vlcSetup

      - run: ./gradlew composeApp:packageDeb composeApp:packageRpm composeApp:createReleaseDistributable -PisFullBuild=true

      - name: Build AppImage (x86_64)
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          APPDIR=composeApp/build/AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr"
          cp -r composeApp/build/compose/binaries/main-release/app/SakayoriMusic/. "$APPDIR/usr/"

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/SakayoriMusic" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          cat > "$APPDIR/sakayori-music.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=SakayoriMusic
          Comment=SakayoriMusic - Music Player
          Exec=SakayoriMusic
          Icon=sakayori-music
          Categories=AudioVideo;Audio;Player;
          Terminal=false
          EOF

          cp composeApp/icon/circle_app_icon.png "$APPDIR/sakayori-music.png"

          ARCH=x86_64 ./appimagetool "$APPDIR" composeApp/build/SakayoriMusic-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: SakayoriMusic-linux-x86_64
          path: |
            composeApp/build/compose/binaries/main/deb/*.deb
            composeApp/build/compose/binaries/main/rpm/*.rpm
            composeApp/build/SakayoriMusic-x86_64.AppImage
          if-no-files-found: error

  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 fakeroot rpm file desktop-file-utils

      - run: chmod +x ./gradlew

      - run: ./gradlew vlcSetup

      - run: ./gradlew composeApp:packageDeb composeApp:packageRpm composeApp:createReleaseDistributable -PisFullBuild=true

      - name: Build AppImage (aarch64)
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-aarch64.AppImage -O appimagetool
          chmod +x appimagetool

          APPDIR=composeApp/build/AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr"
          cp -r composeApp/build/compose/binaries/main-release/app/SakayoriMusic/. "$APPDIR/usr/"

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/SakayoriMusic" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          cat > "$APPDIR/sakayori-music.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=SakayoriMusic
          Comment=SakayoriMusic - Music Player
          Exec=SakayoriMusic
          Icon=sakayori-music
          Categories=AudioVideo;Audio;Player;
          Terminal=false
          EOF

          cp composeApp/icon/circle_app_icon.png "$APPDIR/sakayori-music.png"

          ARCH=aarch64 ./appimagetool "$APPDIR" composeApp/build/SakayoriMusic-aarch64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: SakayoriMusic-linux-aarch64
          path: |
            composeApp/build/compose/binaries/main/deb/*.deb
            composeApp/build/compose/binaries/main/rpm/*.rpm
            composeApp/build/SakayoriMusic-aarch64.AppImage
          if-no-files-found: error

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - run: chmod +x ./gradlew

      - run: ./gradlew vlcSetup

      - run: ./gradlew composeApp:packageDmg composeApp:packagePkg -PisFullBuild=true

      - uses: actions/upload-artifact@v4
        with:
          name: SakayoriMusic-macos-arm64
          path: |
            composeApp/build/compose/binaries/main/dmg/*.dmg
            composeApp/build/compose/binaries/main/pkg/*.pkg
          if-no-files-found: error

  ios-ipa:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - run: chmod +x ./gradlew

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build iOS archive (unsigned)
        working-directory: iosApp
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          xcodebuild archive \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/SakayoriMusic.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM=""

      - name: Package unsigned IPA
        working-directory: iosApp
        run: |
          mkdir -p build/Payload
          cp -R build/SakayoriMusic.xcarchive/Products/Applications/iosApp.app build/Payload/SakayoriMusic.app
          cd build
          zip -qry SakayoriMusic-2.1.5-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: SakayoriMusic-ios-ipa-unsigned
          path: iosApp/build/SakayoriMusic-2.1.5-unsigned.ipa
          if-no-files-found: error
