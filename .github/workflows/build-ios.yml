name: Build iOS

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-ios-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true -Dkotlin.incremental=false -Xmx8G
  # Prevent Kotlin Native from crashing on Github Action runners
  _JAVA_OPTIONS: "-Xmx8G"

jobs:
  ios-build:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Cache Kotlin Native Compiler
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - run: chmod +x ./gradlew

      # First compile Kotlin iOS code
      - name: Build iOS Framework
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64 --stacktrace --no-daemon -Pkotlin.native.disableCompilerDaemon=true
        
      # You can add steps to build the actual IPA here using Xcode
      # - name: Build IPA
      #   run: |
      #     cd iosApp
      #     xcodebuild -workspace iosApp.xcworkspace -scheme iosApp -configuration Release -sdk iphoneos -archivePath $PWD/build/iosApp.xcarchive archive
      #     xcodebuild -exportArchive -archivePath $PWD/build/iosApp.xcarchive -exportOptionsPlist ExportOptions.plist -exportPath $PWD/build -allowProvisioningUpdates
