name: Build iOS

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-ios-${{ github.ref }}
  cancel-in-progress: true

env:
  # Reduce parallelism and worker counts to save memory
  GRADLE_OPTS: "-Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=1 -Dkotlin.incremental=false -Xmx4G -XX:MaxMetaspaceSize=1G"
  _JAVA_OPTIONS: "-Xmx4G -XX:MaxMetaspaceSize=1G"

jobs:
  ios-build:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Cache Kotlin Native Compiler
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - run: chmod +x ./gradlew

      # Build with strict memory constraints for Kotlin Native
      - name: Build iOS Framework
        run: >
          ./gradlew :composeApp:linkReleaseFrameworkIosArm64 
          --no-daemon 
          -Pkotlin.native.disableCompilerDaemon=true 
          -Pkotlin.native.cacheKind=none 
          -Pkotlin.mpp.enableCInteropCommonization=false
          --stacktrace
